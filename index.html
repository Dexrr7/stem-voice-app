<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Voice Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Smooth hover effect for tasks */
        .task-item { cursor: pointer; transition: all 0.2s ease-in-out; }
        .task-item:hover { transform: translateX(5px); border-color: #4b5563; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-wider text-gray-100">STEM ASSISTANT</h1>
            <p class="text-sm text-blue-400 mt-1 font-semibold" id="status">System Standby... Press Mic to Speak</p>
        </div>

        <div class="flex justify-center mb-8">
            <button id="mic-btn" class="bg-blue-600 hover:bg-blue-500 transition-all duration-300 w-20 h-20 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.4)] focus:outline-none">
                <i class="fas fa-microphone text-3xl"></i>
            </button>
        </div>

        <div class="bg-gray-900 rounded-lg p-4 mb-6 border border-gray-700 min-h-[60px] flex items-center justify-center">
            <p id="transcript" class="text-gray-400 text-center italic text-sm">Waiting for voice input...</p>
        </div>

        <div>
            <h2 class="text-lg font-semibold text-gray-200 mb-1 border-b border-gray-700 pb-2 flex justify-between items-end">
                Local Tasks
                <span class="text-xs text-gray-500 font-normal">(Click to complete)</span>
            </h2>
            <ul id="tasks" class="space-y-2 mt-3"></ul>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const btn = document.getElementById('mic-btn');
        const status = document.getElementById('status');
        const transcriptOut = document.getElementById('transcript');
        const taskList = document.getElementById('tasks');

        // Check browser support
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Sorry, your browser doesn't support voice recognition. Try Chrome!");
        }

        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        // --- VOICE LOGIC ---
        btn.onclick = () => {
            recognition.start();
            btn.classList.remove('bg-blue-600', 'shadow-[0_0_20px_rgba(37,99,235,0.4)]');
            btn.classList.add('bg-red-500', 'shadow-[0_0_20px_rgba(239,68,68,0.6)]', 'animate-pulse');
            status.innerText = "Listening...";
            status.classList.replace('text-blue-400', 'text-red-400');
        };

        recognition.onresult = (event) => {
            btn.classList.remove('bg-red-500', 'shadow-[0_0_20px_rgba(239,68,68,0.6)]', 'animate-pulse');
            btn.classList.add('bg-blue-600', 'shadow-[0_0_20px_rgba(37,99,235,0.4)]');
            status.classList.replace('text-red-400', 'text-blue-400');
            
            const command = event.results[0][0].transcript.toLowerCase();
            transcriptOut.innerText = `Raw Input: "${command}"`;
            processCommand(command);
        };

        recognition.onerror = () => {
            btn.classList.remove('bg-red-500', 'shadow-[0_0_20px_rgba(239,68,68,0.6)]', 'animate-pulse');
            btn.classList.add('bg-blue-600', 'shadow-[0_0_20px_rgba(37,99,235,0.4)]');
            status.classList.replace('text-red-400', 'text-blue-400');
            status.innerText = "Error. Try again.";
        };

        // --- SMART TEXT CLEANER ---
        function cleanText(text) {
            const junkWords = [
                "add a calendar event for", "add a calendar event", "create a calendar event",
                "schedule a meeting for", "schedule a meeting", "schedule", "calendar",
                "remind me to", "add a task to", "add a task", "create a task",
                "make a note to", "please"
            ];
            let cleaned = text;
            junkWords.forEach(word => {
                cleaned = cleaned.replace(word, "");
            });
            return cleaned.trim();
        }

        // --- THE "AI" BRAIN ---
        function processCommand(text) {
            const coreContent = cleanText(text);

            // 1. CALENDAR INTENT
            if (text.includes("calendar") || text.includes("schedule") || text.includes("meeting")) {
                speak("Opening Calendar.");
                status.innerText = "Action: Creating Event: " + coreContent;

                const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(coreContent)}`;
                window.open(url, '_blank');
            } 

            // 2. TASK INTENT
            else if (text.includes("task") || text.includes("remind") || text.includes("todo") || text.includes("note")) {
                speak("Task saved.");
                status.innerText = "Action: Saved Task: " + coreContent;

                const li = document.createElement("li");
                li.innerText = coreContent;
                // Tailwind classes for the list items
                li.className = "task-item bg-gray-700 p-3 rounded-lg text-sm text-gray-200 border border-gray-600 select-none";

                li.onclick = function() {
                    if (this.classList.contains('line-through')) {
                        this.classList.remove('line-through', 'text-gray-500', 'bg-gray-800');
                        this.classList.add('text-gray-200', 'bg-gray-700');
                    } else {
                        this.classList.add('line-through', 'text-gray-500', 'bg-gray-800');
                        this.classList.remove('text-gray-200', 'bg-gray-700');
                        speak("Task completed.");
                    }
                };
                taskList.appendChild(li);
            }

            // 3. UNKNOWN
            else {
                speak("Unknown command.");
                status.innerText = "Try saying 'Schedule...' or 'Remind me to...'";
            }
        }

        function speak(message) {
            const utterance = new SpeechSynthesisUtterance(message);
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
